# ============================================
# College Food Ordering - Application Config
# ============================================

# Server
server.port=8080

# --- DATABASE ---
# For production: switch to MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/food_ordering?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For development: H2 in-memory database (no setup needed)
spring.datasource.url=jdbc:h2:mem:food_ordering;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- JWT ---
jwt.secret=CollegeFoodOrderingSystemVerySecretKey2024CollegeFoodOrderingSystem
jwt.expiration=86400000

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# --- Firebase (optional - comment out if not using FCM) ---
# firebase.config.path=classpath:firebase-service-account.json
app.firebase.enabled=false

# --- Logging ---
logging.level.com.college.food=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN
